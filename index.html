<!DOCTYPE html>
<html>
<head>
<title>AI Business Factory 3.0</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
font-family:Arial;
background:#080808;
color:white;
padding:20px;
text-align:center;
}

.card{
background:#161616;
padding:25px;
border-radius:20px;
max-width:600px;
margin:auto;
}

input,button{
width:90%;
padding:15px;
margin:10px;
border-radius:10px;
border:0;
font-size:16px;
}

button{
background:#00aaff;
color:white;
font-weight:bold;
}

.result{
background:#222;
padding:20px;
border-radius:15px;
text-align:left;
margin-top:20px;
}

.history{
background:#111;
padding:15px;
margin-top:20px;
border-radius:15px;
}

</style>
</head>

<body>

<h1>🚀 AI Business Factory</h1>

<p>Your AI startup machine</p>


<div class="card">

<input id="idea" placeholder="Enter business idea">

<button onclick="generate()">Build Business</button>

<button onclick="copyPlan()">Copy Plan</button>

<button onclick="downloadPlan()">Download</button>


<div id="result" class="result">
Waiting for your idea...
</div>


<div class="history">

<h3>Saved Ideas</h3>

<div id="saved"></div>

</div>


</div>


<script>


let plan="";


function generate(){

let idea=document.getElementById("idea").value;


plan=

"🚀 BUSINESS PLAN\n\n"+

"Business: "+idea+"\n\n"+

"🏷 Brand Ideas\n"+
idea+" Pro\n"+
idea+" Hub\n"+
"Future "+idea+"\n\n"+

"🎯 Customers\n"+
"People looking for better solutions\n\n"+

"🌐 Website\n"+
"Landing page + payments + booking\n\n"+

"📣 Marketing\n"+
"Facebook\nTikTok\nGoogle\nEmail\n\n"+

"💰 Revenue\n"+
"Subscriptions\nPackages\nPremium services";


document.getElementById("result").innerHTML=
plan.replaceAll("\n","<br>");


saveIdea(idea);

}


function saveIdea(idea){

let old=JSON.parse(localStorage.getItem("ideas")||"[]");

old.push(idea);

localStorage.setItem("ideas",JSON.stringify(old));

showIdeas();

}


function showIdeas(){

let list=JSON.parse(localStorage.getItem("ideas")||"[]");

document.getElementById("saved").innerHTML=
list.map(x=>"• "+x).join("<br>");

}


function copyPlan(){

navigator.clipboard.writeText(plan);

alert("Copied!");

}


function downloadPlan(){

let file=new Blob([plan]);

let a=document.createElement("a");

a.href=URL.createObjectURL(file);

a.download="business-plan.txt";

a.click();

}


showIdeas();


</script>

</body>
</html>
