<!DOCTYPE html>
<html>
<head>
<title>AI Business Factory</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#080808;
color:white;
text-align:center;
padding:20px;
}
.card{
max-width:600px;
margin:auto;
background:#1c1c1c;
padding:25px;
border-radius:20px;
}
input,button{
width:90%;
padding:15px;
margin:10px;
border-radius:10px;
border:0;
font-size:16px;
}
button{
background:#00aaff;
color:white;
font-weight:bold;
}
.output{
background:#292929;
padding:20px;
margin-top:20px;
border-radius:15px;
text-align:left;
}
</style>
</head>

<body>

<div class="card">

<h1>🚀 AI Business Factory</h1>

<p>Create your business blueprint in seconds.</p>

<input id="idea" placeholder="Enter your idea">

<button onclick="generate()">
Create Business Blueprint
</button>

<div class="output" id="output">
Your AI business plan appears here.
</div>

</div>


<script>

function generate(){

let idea=document.getElementById("idea").value;

if(!idea){
idea="AI Startup";
}

let names=[
idea+" Labs",
idea+" Solutions",
"NextGen "+idea,
"Future "+idea
];

document.getElementById("output").innerHTML=`

<h2>🚀 ${idea}</h2>

<h3>🏷 Brand Names</h3>
${names.join("<br>")}

<h3>🎯 Customers</h3>
People who need ${idea} services.

<h3>💰 Revenue Model</h3>
• Subscription plans<br>
• Premium services<br>
• Digital products

<h3>📱 Marketing Growth</h3>
• TikTok videos<br>
• Facebook community<br>
• Google search traffic<br>
• Email list building

<h3>⚡ First 7 Days</h3>
1. Create brand<br>
2. Build landing page<br>
3. Find first customers<br>
4. Collect feedback<br>

`;

}

</script>

</body>
</html>
