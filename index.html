<!DOCTYPE html>
<html>
<head>
<title>AI Business Factory 🚀</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
font-family:Arial;
background:#050505;
color:white;
text-align:center;
padding:20px;
}

.box{
background:#151515;
padding:25px;
border-radius:20px;
max-width:600px;
margin:auto;
}

input,button{
width:90%;
padding:15px;
margin:10px;
border-radius:10px;
border:0;
font-size:16px;
}

button{
background:#00aaff;
color:white;
font-weight:bold;
}

.result{
background:#222;
padding:20px;
border-radius:15px;
text-align:left;
margin-top:20px;
}

h1{
font-size:35px;
}
</style>

</head>

<body>

<h1>🚀 AI Business Factory</h1>

<p>Create your next business idea in seconds.</p>

<div class="box">

<input id="idea" placeholder="Example: Mobile car detailing">

<button onclick="build()">Generate Business</button>

<div id="result" class="result">
Your AI business blueprint appears here.
</div>

</div>


<script>

function build(){

let idea=document.getElementById("idea").value;

document.getElementById("result").innerHTML=

"<h2>"+idea+"</h2>"+

"<b>🏷 Brand Names</b><br>"+
idea+" Pro<br>"+
idea+" Hub<br>"+
Future()+"<br><br>"+

"<b>🎯 Customers</b><br>"+
"People who need faster, cheaper and easier solutions.<br><br>"+

"<b>🌐 Website</b><br>"+
"Landing page + booking + payment + customer reviews<br><br>"+

"<b>📣 Marketing</b><br>"+
"Facebook Ads<br>"+
"TikTok videos<br>"+
"Google Search<br>"+
"Email campaigns<br><br>"+

"<b>💰 Revenue</b><br>"+
"Subscriptions<br>"+
"Packages<br>"+
"Premium upgrades<br><br>"+

"<b>🚀 First 7 Days</b><br>"+
"Day 1 Brand setup<br>"+
"Day 2 Create website<br>"+
"Day 3 Start promotion<br>"+
"Day 7 Get first customer";

}

function Future(){

return "Future "+document.getElementById("idea").value;

}

</script>

</body>
</html>
