<!DOCTYPE html>
<html>
<head>
<title>AI Business Factory 5.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#080808;
color:white;
padding:20px;
text-align:center;
}

.card{
background:#161616;
padding:25px;
border-radius:20px;
max-width:600px;
margin:auto;
}

input,button{
width:90%;
padding:15px;
margin:10px;
border-radius:10px;
border:0;
font-size:16px;
}

button{
background:#00aaff;
color:white;
font-weight:bold;
}

.result{
background:#222;
padding:20px;
border-radius:15px;
margin-top:20px;
text-align:left;
}

.history{
background:#111;
padding:15px;
border-radius:15px;
margin-top:20px;
}
</style>
</head>

<body>

<h1>🚀 AI Business Factory</h1>
<p>Your AI startup machine</p>

<div class="card">

<input id="idea" placeholder="Enter your business idea">

<button onclick="generate()">Build My Business</button>

<button onclick="copyPlan()">Copy Plan</button>

<button onclick="downloadPlan()">Download Plan</button>

<div id="result" class="result">
Waiting for your idea...
</div>

<div class="history">
<h3>Saved Ideas</h3>
<div id="saved"></div>
</div>

</div>

<script>

let plan="";


async function generate(){

let idea=document.getElementById("idea").value;

if(!idea){
alert("Enter a business idea");
return;
}

document.getElementById("result").innerHTML="🤖 Creating...";


try{

let response = await fetch(
"https://YOUR-BACKEND-URL/generate",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
idea:idea
})
});


let data = await response.json();

plan=data.result;


}

catch(error){

plan=
"🚀 AI BUSINESS PLAN\n\n"+
"Business: "+idea+
"\n\n✅ Brand Ideas"+
"\n✅ Website Plan"+
"\n✅ Marketing Plan"+
"\n✅ Revenue Ideas";

}


document.getElementById("result").innerHTML=
plan.replaceAll("\n","<br>");


saveIdea(idea);

}



function saveIdea(idea){

let ideas=
JSON.parse(localStorage.getItem("ideas")||"[]");

ideas.push(idea);

localStorage.setItem(
"ideas",
JSON.stringify(ideas)
);

showIdeas();

}



function showIdeas(){

let ideas=
JSON.parse(localStorage.getItem("ideas")||"[]");

document.getElementById("saved").innerHTML=
ideas.map(x=>"• "+x).join("<br>");

}



function copyPlan(){

navigator.clipboard.writeText(plan);

alert("Copied!");

}



function downloadPlan(){

let file=new Blob([plan]);

let link=document.createElement("a");

link.href=URL.createObjectURL(file);

link.download="business-plan.txt";

link.click();

}


showIdeas();

</script>

</body>
</html>
